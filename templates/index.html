{% extends 'base.html' %}

{% block content %}
<div class="landing-container fade-in-up">
    <!-- Left: Feature Image (Coffee Shop Interior) -->
    <div class="landing-visual">
        <img src="/static/images/coffee_img.jpg" alt="Coffee Shop Interior">
        <div class="visual-overlay">
            <h2>Let's make your journey with coffee</h2>
        </div>
    </div>

    <!-- Right: Action Cards -->
    <div class="landing-actions">
        <!-- Card 1: Analysis -->
        <div class="action-card primary-card">
            <div class="card-content">
                <h2>나의 커피 취향 <span class="highlight">프로필 분석</span></h2>
                <p>너의 커피 취향 프로필 분석<br>당신의 취향을 알려드립니다.</p>
                <!-- Links to the Preference Form -->
                <a href="{% url 'core:preference_form' %}" class="btn btn-glow">내 프로필 보기</a>

                <!-- Decorative Chart graphic (Can be CSS or SVG) -->
                <div class="chart-deco">
                    <svg viewBox="0 0 100 30" class="wave-chart">
                        <path d="M0,15 Q25,30 50,15 T100,15" fill="none" stroke="rgba(192, 128, 96, 0.3)"
                            stroke-width="2" />
                        <path d="M0,20 Q25,5 50,20 T100,20" fill="none" stroke="rgba(192, 128, 96, 0.5)"
                            stroke-width="2" />
                    </svg>
                </div>
            </div>
        </div>

        <!-- Card 2: Quick Recommendation -->
        <div class="action-card secondary-card">
            <div class="card-content">
                <h2>오늘의 기분에 맞춘 한 잔</h2>
                <p>오늘의 기분에게 알맞는 추천입니다.</p>
                <a href="{% url 'core:preference_form' %}" class="btn btn-light">오늘의 추천받기</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
