{% load static %}
<!DOCTYPE html>
<html lang="ko">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Coffee & Tea Recommender{% endblock %}</title>
    <link rel="stylesheet" href="{% static 'css/style.css' %}?v=2">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&family=Outfit:wght@300;400;600&display=swap"
        rel="stylesheet">
    <!-- Font Awesome for Icons (Optional for premium feel) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <header class="main-header">
        <div class="container header-content">
            <a href="/" class="logo-link">
                <img src="/static/images/logo.png" alt="나만의 커피아지트 Logos" class="logo-img">
            </a>
            <nav class="main-nav">
                <a href="/">Home</a>
                <a href="/admin">Admin</a>
            </nav>
        </div>
    </header>

    <!-- Global Sub Navigation Bar -->
    <div class="global-sub-nav">
        <div class="container sub-nav-links">
            <a href="{% url 'core:preference_form' %}">내 프로필 보기</a>
            <a href="{% url 'core:preference_form' %}">내 커피취향 알아보기</a>
            <a href="{% url 'core:preference_form' %}">오늘의 추천받기</a>
        </div>
    </div>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>

    <footer class="main-footer">
        <div class="container">
            <p>&copy; 2026 Coffee/Tea Recommendation Service</p>
        </div>
    </footer>
</body>

</html>
