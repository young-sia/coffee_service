{% extends 'base.html' %}
{% load static %}

{% block extra_css %}
<style>
    .roulette-wrapper {
        padding: 40px 20px 140px 20px;
        max-width: 600px;
        margin: 0 auto;
        min-height: calc(100vh - 70px);
        text-align: center;
    }

    .roulette-title {
        font-family: var(--title-font);
        font-size: 2rem;
        color: var(--title-color);
        text-align: center;
        margin-bottom: 30px;
    }

    .roulette-wheel-container {
        background: rgba(0, 0, 0, 0.6);
        backdrop-filter: blur(10px);
        border: 2px solid var(--accent-color);
        border-radius: 16px;
        padding: 40px;
        margin-bottom: 30px;
    }

    .wheel-display {
        width: 300px;
        height: 300px;
        margin: 0 auto 30px;
        border: 3px solid var(--accent-color);
        border-radius: 50%;
        background: radial-gradient(circle, rgba(192, 128, 96, 0.2), rgba(0, 0, 0, 0.8));
        display: flex;
        align-items: center;
        justify-content: center;
        position: relative;
        overflow: hidden;
        transition: transform 3s cubic-bezier(0.17, 0.67, 0.12, 0.99);
    }

    .wheel-display.spinning {
        animation: spin 3s cubic-bezier(0.17, 0.67, 0.12, 0.99);
    }

    @keyframes spin {
        0% {
            transform: rotate(0deg);
        }

        100% {
            transform: rotate(1800deg);
        }
    }

    .wheel-item {
        position: absolute;
        font-family: var(--body-font);
        color: var(--text-color);
        font-size: 0.9rem;
    }

    .result-display {
        min-height: 100px;
        margin-bottom: 20px;
    }

    .result-coffee {
        background: rgba(192, 128, 96, 0.2);
        border: 2px solid var(--accent-color);
        border-radius: 12px;
        padding: 20px;
        margin-top: 20px;
    }

    .result-name {
        font-family: var(--title-font);
        font-size: 1.5rem;
        color: var(--title-color);
        margin-bottom: 10px;
    }

    .result-description {
        font-family: var(--body-font);
        color: var(--text-color);
        line-height: 1.6;
    }

    .spin-btn {
        background: var(--accent-color);
        color: #000;
        border: none;
        padding: 15px 50px;
        border-radius: 12px;
        font-family: var(--title-font);
        font-size: 1.3rem;
        cursor: pointer;
        transition: all 0.3s ease;
        margin-bottom: 15px;
    }

    .spin-btn:hover:not(:disabled) {
        transform: scale(1.05);
        box-shadow: 0 4px 12px rgba(192, 128, 96, 0.6);
    }

    .spin-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
    }

    .back-btn {
        background: rgba(0, 0, 0, 0.7);
        border: 2px solid var(--accent-color);
        color: var(--text-color);
        padding: 12px 30px;
        border-radius: 12px;
        font-family: var(--body-font);
        font-size: 1rem;
        cursor: pointer;
        transition: all 0.3s ease;
        text-decoration: none;
        display: inline-block;
    }

    .back-btn:hover {
        background: rgba(192, 128, 96, 0.3);
        transform: translateY(-2px);
    }
</style>
{% endblock %}

{% block content %}
<div class="roulette-wrapper">
    <h1 class="roulette-title">🎡 룰렛으로 뽑기</h1>

    <div class="roulette-wheel-container">
        <div class="wheel-display" id="wheelDisplay">
            <div style="font-family: var(--title-font); font-size: 2rem; color: var(--title-color);">?</div>
        </div>

        <div class="result-display" id="resultDisplay">
            <p style="color: var(--text-color); font-family: var(--body-font);">
                SPIN 버튼을 눌러 랜덤 커피를 선택하세요!
            </p>
        </div>

        <button class="spin-btn" id="spinBtn" onclick="spinWheel()">SPIN</button>
        <br>
        <a href="{% url 'daily_recommendation' %}" class="back-btn">돌아가기</a>
    </div>
</div>

<script>
    let isSpinning = false;

    function spinWheel() {
        if (isSpinning) return;

        isSpinning = true;
        const spinBtn = document.getElementById('spinBtn');
        const wheelDisplay = document.getElementById('wheelDisplay');
        const resultDisplay = document.getElementById('resultDisplay');

        spinBtn.disabled = true;
        resultDisplay.innerHTML = '<p style="color: var(--text-color); font-family: var(--body-font);">돌리는 중...</p>';

        // Add spinning animation
        wheelDisplay.classList.add('spinning');

        // Fetch random coffee
        fetch('/api/roulette/')
            .then(response => response.json())
            .then(data => {
                // Wait for animation to complete
                setTimeout(() => {
                    wheelDisplay.classList.remove('spinning');

                    // Display result
                    resultDisplay.innerHTML = `
                        <div class="result-coffee">
                            <h2 class="result-name">${data.name}</h2>
                            <p class="result-description">${data.description}</p>
                        </div>
                    `;

                    wheelDisplay.innerHTML = `
                        <div style="font-family: var(--title-font); font-size: 1.5rem; color: var(--title-color); text-align: center;">
                            ${data.name}
                        </div>
                    `;

                    isSpinning = false;
                    spinBtn.disabled = false;
                }, 3000);
            })
            .catch(error => {
                console.error('Error:', error);
                resultDisplay.innerHTML = '<p style="color: #ff6b6b;">오류가 발생했습니다.</p>';
                wheelDisplay.classList.remove('spinning');
                isSpinning = false;
                spinBtn.disabled = false;
            });
    }
</script>
{% endblock %}
